name: Build Mobile


on:  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [ main, experimental ]
  pull_request:
    branches: [ main, experimental ]
  workflow_dispatch:
jobs:
   Android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.1.0
        with:
          haxe-version: 4.3.7

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-13 g++-13 vlc libvlc-dev libvlccore-dev vlc-bin \
            libwayland-dev libwayland-bin wayland-protocols libasound2-dev \
            libpulse-dev libjack-jackd2-dev libpipewire-0.3-dev libgl1-mesa-dev \
            libegl1-mesa-dev libglu1-mesa-dev libdbus-1-dev libudev-dev \
            libxkbcommon-dev libx11-dev libxext-dev libx11-xcb-dev libxfixes-dev \
            libxss-dev libxrender-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxxf86vm-dev libgbm-dev libdrm-dev libdecor-0-dev \
            libvulkan-dev pkg-config

      - name: Prepare Android Lime rebuild
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          set -euo pipefail
          haxelib setup ~/haxelib
          haxelib install hxcpp > /dev/null --quiet
          haxelib install hxpkg --quiet
          haxelib run hxpkg install
          rm -rf .haxelib/lime
          git clone https://github.com/FunkinCrew/lime .haxelib/lime/git
          git -C .haxelib/lime/git checkout 6421de16b9dfa4fb55c19f12db65d392a57585c8
          git -C .haxelib/lime/git submodule update --init --recursive --force
          haxelib dev lime .haxelib/lime/git
          
      - name: Rebuild Linux Lime ndll
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          haxelib run lime rebuild cpp -release
          if [ ! -f .haxelib/lime/git/ndll/Linux64/lime.ndll ]; then
            echo "ERROR: Missing Lime ndll"
            exit 1
          fi
          
      - name: Configure Android
        run: |
          haxelib run lime setup android
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_LATEST_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          haxelib run lime config ANDROID_SETUP true

      - name: Rebuild Android Lime so
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          haxelib run lime rebuild android -release
          if [ ! -f .haxelib/lime/git/ndll/Android/liblime-64.so ]; then
            echo "ERROR: Missing Liblime 64 so"
            exit 1
          fi

      - name: Compile
        run: haxelib run lime build android -final -D DLC

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ImpostorLegacy (Android)
          path: export/release/android/bin/app/build/outputs/apk/*
          if-no-files-found: error
  iOS:
    name: Build iOS
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.1.0
        with:
          haxe-version: 4.3.7

      - name: Install Haxelib + Lime (Pinned)
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --quiet
          haxelib install hxpkg --quiet
          haxelib run hxpkg install

          rm -rf .haxelib/lime
          git clone https://github.com/FunkinCrew/lime .haxelib/lime/git
          git -C .haxelib/lime/git checkout 6421de16b9dfa4fb55c19f12db65d392a57585c8
          git -C .haxelib/lime/git submodule update --init --recursive --force
          haxelib dev lime .haxelib/lime/git

      - name: Rebuild Lime (iOS)
        run: |
          haxelib run lime rebuild ios -release
          if [ ! -f .haxelib/lime/git/ndll/iPhone/liblime.iphoneos.a ]; then
            echo "ERROR: Missing iOS Lime static library"
            exit 1
          fi

      - name: Compile iOS
        run: |
          haxelib run lime build ios -final -D DLC

      - name: Upload Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ImpostorLegacy (iOS)
          path: export/release/ios/*
          if-no-files-found: error
