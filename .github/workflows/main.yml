name: Build All Platforms

on:
  push:
    branches:
      - main
      - dev
      - feature/**
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  HAXE_VERSION: 4.3.3
  LIME_VERSION: 8.1.2
  OPENFL_VERSION: 9.3.3
  HXCPP_VERSION: 4.3.2

jobs:
  setup:
    name: Setup (shared)
    runs-on: ubuntu-latest
    outputs:
      haxe-version: ${{ steps.haxe.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        id: haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Install Haxelib deps (Lime from Haxelib)
        run: |
          haxelib setup ~/.haxelib
          haxelib install lime $LIME_VERSION --quiet
          haxelib install openfl $OPENFL_VERSION --quiet
          haxelib install hxcpp $HXCPP_VERSION --quiet
          haxelib run lime setup
          haxelib run lime config

  windows:
    name: Windows
    needs: setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ needs.setup.outputs.haxe-version }}

      - name: Build Windows
        run: haxelib run lime build Project.xml windows -release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: export/release/windows/bin

  linux:
    name: Linux
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ needs.setup.outputs.haxe-version }}

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libx11-dev libxext-dev libxi-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev

      - name: Build Linux
        run: haxelib run lime build Project.xml linux -release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: export/release/linux/bin

  macos:
    name: macOS
    needs: setup
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ needs.setup.outputs.haxe-version }}

      - name: Build macOS
        run: haxelib run lime build Project.xml mac -release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: export/release/macos/bin

  ios:
    name: iOS
    needs: setup
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ needs.setup.outputs.haxe-version }}

      - name: Patch Lime iOS sources (optional)
        run: |
          LIME_PATH=$(haxelib path lime | head -n 1)
          SYS_MM="$LIME_PATH/project/src/ios/System.mm"
          if [ -f "$SYS_MM" ]; then
            perl -pi -e 's/return systemInfo.machine;/return strdup(systemInfo.machine);/' "$SYS_MM"
          fi

      - name: Build iOS
        run: haxelib run lime build Project.xml ios -release

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: export/release/ios/build

  android:
    name: Android
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: ${{ needs.setup.outputs.haxe-version }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 25.2
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build Android
        run: haxelib run lime build Project.xml android -release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: export/release/android/bin
